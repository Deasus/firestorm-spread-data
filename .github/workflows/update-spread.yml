name: Update Fire Spread Forecast (PyreCast/ELMFIRE)

# PyreCast publishes new ELMFIRE runs a few times/day per active fire. A 20-min
# cron easily keeps up; no aggressive self-redispatch loop needed (unlike the
# real-time detection feeds). */20 is throttled by GHA but that's fine here.
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    concurrency:
      group: update-spread
      cancel-in-progress: false
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pyshp pyproj      # pure-Python wheels, no GDAL needed
      - name: Fetch spread forecasts
        run: python fetch_spread.py
      - name: Commit if changed
        run: |
          git config user.name  'firestorm-bot'
          git config user.email 'firestorm-bot@users.noreply.github.com'
          git add data/spread.json
          if git diff --cached --quiet; then
            echo 'No change'
          else
            git commit -m "spread update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
